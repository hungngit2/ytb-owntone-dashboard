# Synthetic software volume control for the snd-aloop "Loopback" card, which
# has no real hardware mixer element (confirmed via amixer: only PCM
# Notify/Slave-* controls exist, nothing OwnTone can attach to as PCM or
# Master). Wraps hw:Loopback,0 with ALSA's softvol plugin, which registers
# its own synthetic mixer element so OwnTone's output-select endpoint stops
# hard-failing on a missing volume control.
pcm.stereo_split_out {
    type softvol
    slave.pcm "hw:Loopback,0"
    control {
        name "Stereo Split Volume"
        card 0
    }
}

ctl.stereo_split_out {
    type hw
    card 0
}
