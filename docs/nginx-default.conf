##
# nginx server configuration
#

server { 

        listen 80; 
        listen [::]:80;
        server_name _;
	
	root /mnt/appsrv/www;

	access_log  /mnt/appsrv/nginx/log/nginx-access.log;
	error_log  /mnt/appsrv/nginx/log/nginx-error.log;
	
	# Add index.php to the list if you are using PHP
	index index.html index.htm index.nginx-debian.html index.php;
        

	location / {
		# First attempt to serve request as file, then
		# as directory, then fall back to displaying a 404.
		try_files $uri $uri/ =404;
	}

	# pass PHP scripts to FastCGI server
	#
	location = /ytb/backend.php {
		include snippets/fastcgi-php.conf;
		fastcgi_pass unix:/run/php/php-fpm.sock;
		fastcgi_param PHP_VALUE "open_basedir=/";
		fastcgi_read_timeout 120s;
		# A page reload aborts the browser connection to nginx; without
		# this nginx tears down the FastCGI request to php-fpm on that
		# disconnect regardless of PHPs own ignore_user_abort(), which let
		# a reload-then-click-Play cycle cut a play/stop/seek request short
		# mid-flock and bypass the playback lock entirely (confirmed live).
		fastcgi_ignore_client_abort on;
	}

	location ~ \.php$ {
		include snippets/fastcgi-php.conf;
	
		# With php-fpm (or other unix sockets):
		fastcgi_pass unix:/run/php/php-fpm.sock;
		# With php-cgi (or other tcp sockets):
		#fastcgi_pass 127.0.0.1:9000;
		#fastcgi_param PHP_VALUE "open_basedir=/mnt/appsrv/www:/var/lib/php/sessions";
	        fastcgi_param PHP_VALUE "open_basedir=/";
	}

	# deny access to .htaccess files, if Apache's document root
	# concurs with nginx's one
	#
	#location ~ /\.ht {
	#	deny all;
	#}

    location /jellyfin/ {
        # Proxy main Jellyfin traffic

        # The / at the end is significant.
        # https://www.acunetix.com/blog/articles/a-fresh-look-on-reverse-proxy-related-attacks/

        proxy_pass http://localhost:8096/jellyfin/;

        proxy_pass_request_headers on;

        proxy_set_header Host $host;

        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $http_host;

        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $http_connection;

        # Disable buffering when the nginx proxy gets very resource heavy upon streaming
        proxy_buffering off;
    }
		
    location /tv/ {
        proxy_pass http://localhost:5140/tv/;

        proxy_pass_request_headers on;

        proxy_set_header Host $host;

        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $http_host;

        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $http_connection;

        # Disable buffering when the nginx proxy gets very resource heavy upon streaming
        proxy_buffering off;
    }

    # OwnTone's JSON API + artwork/stream endpoints — lets the dashboard
    # (public/app.js's owntoneBase()) reach OwnTone over https when accessed
    # via a public hostname, where the raw :3689 port isn't reachable.
    location /owntone/ {
        proxy_pass http://127.0.0.1:3689/;

        proxy_pass_request_headers on;

        proxy_set_header Host $host;

        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $http_host;

        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $http_connection;
    }

    # OwnTone's separate websocket port (notify events) — a distinct
    # location since it's a different backend port from the JSON API above.
    # Long proxy_read_timeout keeps nginx from dropping this connection
    # during idle stretches between player/queue state changes.
    location /owntone-ws/ {
        proxy_pass http://127.0.0.1:3688/;

        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 3600s;
    }

    location ~* /.well-known/acme-challenge {
        allow all;
        rewrite ^/(.*)$ /$1;
        root /mnt/nasdata/share/www/certbot/;
        break;
    }

    listen [::]:443 ssl; # managed by Certbot
    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/lotus.ddns.net/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/lotus.ddns.net/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot
}

server {
    if ($host ~* "^(lotus\.ddns\.net|f94b0f9e4d9f\.sn\.mynetname\.net)$") {
        return 301 https://$host$request_uri;
    }
}
